<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陈奎铭 2025-2026春 课表</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d0d2b 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 24px 16px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .header .subtitle { color: #9ca3af; font-size: 0.9rem; }
        .week-nav {
            display: flex; justify-content: center; align-items: center;
            gap: 16px; margin-bottom: 18px;
        }
        .week-nav button {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            color: #e0e0e0; padding: 8px 18px; border-radius: 10px;
            cursor: pointer; font-size: 0.9rem; transition: all 0.3s;
        }
        .week-nav button:hover { background: rgba(167,139,250,0.2); border-color: rgba(167,139,250,0.4); }
        .week-label { font-size: 1.1rem; font-weight: 600; color: #a78bfa; min-width: 100px; text-align: center; }
        .schedule-wrapper { max-width: 1400px; margin: 0 auto; overflow-x: auto; }
        table.schedule {
            width: 100%; border-collapse: separate; border-spacing: 3px; min-width: 960px;
        }
        table.schedule th {
            background: rgba(167,139,250,0.15); padding: 10px 6px; border-radius: 8px;
            font-size: 0.85rem; font-weight: 600; color: #c4b5fd; text-align: center;
        }
        table.schedule th.today { background: rgba(167,139,250,0.3); box-shadow: 0 0 12px rgba(167,139,250,0.2); }
        table.schedule td {
            background: rgba(255,255,255,0.02); border-radius: 8px; padding: 2px;
            vertical-align: top; height: 52px; position: relative; min-width: 140px;
        }
        .time-col {
            text-align: center; font-size: 0.75rem; color: #9ca3af; min-width: 80px !important;
            vertical-align: middle; line-height: 1.5;
        }
        .time-col .section-num { font-weight: 700; color: #a78bfa; font-size: 0.85rem; }
        .course-cell {
            border-radius: 10px; padding: 8px 6px; cursor: pointer;
            position: relative; overflow: hidden; transition: all 0.3s;
            height: 100%; display: flex; flex-direction: column; justify-content: center;
        }
        .course-cell::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 3px; border-radius: 3px 0 0 3px;
        }
        .course-cell:hover { transform: scale(1.02); z-index: 2; }
        .c-purple { background: rgba(167,139,250,0.13); border: 1px solid rgba(167,139,250,0.22); }
        .c-purple::before { background: #a78bfa; }
        .c-purple:hover { box-shadow: 0 4px 20px rgba(167,139,250,0.25); }
        .c-blue { background: rgba(96,165,250,0.13); border: 1px solid rgba(96,165,250,0.22); }
        .c-blue::before { background: #60a5fa; }
        .c-blue:hover { box-shadow: 0 4px 20px rgba(96,165,250,0.25); }
        .c-green { background: rgba(52,211,153,0.13); border: 1px solid rgba(52,211,153,0.22); }
        .c-green::before { background: #34d399; }
        .c-green:hover { box-shadow: 0 4px 20px rgba(52,211,153,0.25); }
        .c-pink { background: rgba(244,114,182,0.13); border: 1px solid rgba(244,114,182,0.22); }
        .c-pink::before { background: #f472b6; }
        .c-pink:hover { box-shadow: 0 4px 20px rgba(244,114,182,0.25); }
        .c-cyan { background: rgba(34,211,238,0.13); border: 1px solid rgba(34,211,238,0.22); }
        .c-cyan::before { background: #22d3ee; }
        .c-cyan:hover { box-shadow: 0 4px 20px rgba(34,211,238,0.25); }
        .c-indigo { background: rgba(129,140,248,0.13); border: 1px solid rgba(129,140,248,0.22); }
        .c-indigo::before { background: #818cf8; }
        .c-indigo:hover { box-shadow: 0 4px 20px rgba(129,140,248,0.25); }
        .c-amber { background: rgba(245,158,11,0.13); border: 1px solid rgba(245,158,11,0.22); }
        .c-amber::before { background: #f59e0b; }
        .c-amber:hover { box-shadow: 0 4px 20px rgba(245,158,11,0.25); }
        .course-name { font-size: 0.82rem; font-weight: 600; color: #f3f4f6; padding-left: 8px; margin-bottom: 3px; text-align: left; }
        .course-info { font-size: 0.68rem; color: #9ca3af; padding-left: 8px; line-height: 1.4; text-align: left; }
        .has-notes-badge {
            position: absolute; top: 4px; right: 6px; width: 8px; height: 8px;
            background: #f59e0b; border-radius: 50%; box-shadow: 0 0 6px rgba(245,158,11,0.5);
        }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); z-index: 1000;
            justify-content: center; align-items: center; backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: linear-gradient(145deg, #1e1e3f, #2a2a50);
            border: 1px solid rgba(167,139,250,0.3); border-radius: 20px;
            padding: 28px; max-width: 560px; width: 92%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); animation: modalIn 0.3s ease;
            max-height: 90vh; overflow-y: auto;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal h2 { font-size: 1.2rem; color: #e5e7eb; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal-row { display: flex; padding: 7px 0; font-size: 0.88rem; }
        .modal-label { color: #9ca3af; width: 70px; flex-shrink: 0; }
        .modal-value { color: #e5e7eb; }

        /* Tabs */
        .modal-tabs {
            display: flex; gap: 0; margin-top: 16px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .modal-tab {
            padding: 10px 20px; font-size: 0.88rem; color: #9ca3af; cursor: pointer;
            border-bottom: 2px solid transparent; transition: all 0.3s; background: none; border-top: none; border-left: none; border-right: none;
        }
        .modal-tab:hover { color: #c4b5fd; }
        .modal-tab.active { color: #a78bfa; border-bottom-color: #a78bfa; }
        .tab-content { display: none; padding-top: 14px; }
        .tab-content.active { display: block; }

        /* Notes */
        .notes-area {
            width: 100%; min-height: 120px; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: #e5e7eb; padding: 12px; font-size: 0.88rem; resize: vertical;
            font-family: inherit; outline: none; transition: border-color 0.3s;
        }
        .notes-area:focus { border-color: rgba(167,139,250,0.5); }
        .notes-area::placeholder { color: #6b7280; }

        /* Attachments */
        .attachment-zone {
            border: 2px dashed rgba(255,255,255,0.15); border-radius: 12px;
            padding: 24px; text-align: center; cursor: pointer; transition: all 0.3s;
            margin-bottom: 12px;
        }
        .attachment-zone:hover { border-color: rgba(167,139,250,0.4); background: rgba(167,139,250,0.05); }
        .attachment-zone-text { color: #9ca3af; font-size: 0.85rem; }
        .attachment-zone-icon { font-size: 2rem; margin-bottom: 6px; }
        .attachment-list { display: flex; flex-direction: column; gap: 8px; }
        .attachment-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 12px;
            background: rgba(0,0,0,0.25); border-radius: 10px; border: 1px solid rgba(255,255,255,0.06);
        }
        .attachment-item .att-icon { font-size: 1.5rem; flex-shrink: 0; }
        .attachment-item .att-info { flex: 1; min-width: 0; }
        .attachment-item .att-name { font-size: 0.85rem; color: #e5e7eb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .attachment-item .att-size { font-size: 0.72rem; color: #6b7280; }
        .attachment-item .att-delete {
            background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.25);
            color: #f87171; border-radius: 8px; padding: 4px 10px; cursor: pointer;
            font-size: 0.78rem; transition: all 0.3s;
        }
        .attachment-item .att-delete:hover { background: rgba(239,68,68,0.3); }
        .attachment-preview {
            max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 6px;
            cursor: pointer; transition: transform 0.3s;
        }
        .attachment-preview:hover { transform: scale(1.02); }

        /* Buttons */
        .modal-buttons { display: flex; gap: 10px; margin-top: 18px; }
        .btn-save {
            flex: 1; padding: 10px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #a78bfa, #7c3aed); color: #fff;
            font-size: 0.9rem; cursor: pointer; transition: all 0.3s; font-weight: 600;
        }
        .btn-save:hover { box-shadow: 0 4px 15px rgba(167,139,250,0.4); }
        .btn-close {
            flex: 1; padding: 10px; border-radius: 12px;
            border: 1px solid rgba(167,139,250,0.3); background: rgba(167,139,250,0.1);
            color: #c4b5fd; font-size: 0.9rem; cursor: pointer; transition: all 0.3s;
        }
        .btn-close:hover { background: rgba(167,139,250,0.2); }

        .save-toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(52,211,153,0.9); color: #fff; padding: 10px 24px;
            border-radius: 12px; font-size: 0.9rem; z-index: 2000;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .save-toast.show { opacity: 1; }

        /* Image preview overlay */
        .img-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center;
            align-items: center; cursor: pointer;
        }
        .img-overlay.show { display: flex; }
        .img-overlay img { max-width: 92%; max-height: 92%; border-radius: 12px; }
    </style>
</head>
<body>

<div class="header">
    <h1>陈奎铭 2025-2026春 课表</h1>
    <div class="subtitle">上海大学 · 数据自动保存在浏览器本地</div>
</div>

<div class="week-nav">
    <button onclick="changeWeek(-1)">◀ 上一周</button>
    <span class="week-label" id="weekLabel">第1周</span>
    <button onclick="changeWeek(1)">下一周 ▶</button>
</div>

<div class="schedule-wrapper">
    <table class="schedule" id="scheduleTable"></table>
</div>

<!-- Course Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <h2 id="modalTitle"></h2>
        <div id="modalInfo"></div>
        <div class="modal-tabs">
            <button class="modal-tab active" onclick="switchTab('notes',this)">📝 备注</button>
            <button class="modal-tab" onclick="switchTab('attachments',this)">📎 附件</button>
        </div>
        <div class="tab-content active" id="tab-notes">
            <textarea class="notes-area" id="notesArea" placeholder="在这里写下你的课程笔记、心得、作业提醒..."></textarea>
        </div>
        <div class="tab-content" id="tab-attachments">
            <div class="attachment-zone" id="attachZone" onclick="document.getElementById('fileInput').click()">
                <div class="attachment-zone-icon">📁</div>
                <div class="attachment-zone-text">点击上传图片或文档<br><span style="font-size:0.75rem;color:#6b7280">支持图片、PDF、Word、文本等</span></div>
            </div>
            <input type="file" id="fileInput" style="display:none" multiple accept="image/*,.pdf,.doc,.docx,.txt,.md,.ppt,.pptx,.xls,.xlsx" onchange="handleFiles(this.files)">
            <div class="attachment-list" id="attachList"></div>
        </div>
        <div class="modal-buttons">
            <button class="btn-save" onclick="saveAndClose()">💾 保存</button>
            <button class="btn-close" onclick="closeModal()">关闭</button>
        </div>
    </div>
</div>

<!-- Image Preview -->
<div class="img-overlay" id="imgOverlay" onclick="this.classList.remove('show')">
    <img id="imgPreview" src="">
</div>

<!-- Toast -->
<div class="save-toast" id="saveToast">✅ 已保存</div>

<script>
const sectionTimes = [
    { s: '08:00', e: '08:45' }, { s: '08:55', e: '09:40' },
    { s: '10:00', e: '10:45' }, { s: '10:55', e: '11:40' },
    { s: '13:00', e: '13:45' }, { s: '13:55', e: '14:40' },
    { s: '15:00', e: '15:45' }, { s: '15:55', e: '16:40' },
    { s: '18:00', e: '18:45' }, { s: '18:55', e: '19:40' },
    { s: '19:50', e: '20:35' }, { s: '20:45', e: '21:30' }
];
const dayNames = ['星期一','星期二','星期三','星期四','星期五'];
const colorClasses = ['c-purple','c-blue','c-green','c-pink','c-cyan','c-indigo','c-amber'];

const courses = [
    { name: '世界美术史(2)', day: 0, startSection: 1, endSection: 2, weeks: [1,16], room: 'A111', teacher: '刘向娟', code: 'BBK1761004' },
    { name: '化学与饮食安全', day: 0, startSection: 5, endSection: 6, weeks: [9,16], room: 'GJ203', teacher: '纪晓波', code: 'KBK0100002' },
    { name: '启蒙思想家与日本近代化', day: 0, startSection: 7, endSection: 8, weeks: [9,16], room: 'CJ207', teacher: '张智慧', code: 'ZBK0400003' },
    { name: '军事理论', day: 0, startSection: 11, endSection: 12, weeks: [1,8,16], weekType: 'specific', room: 'EJ203', teacher: '张金翠', code: 'GBK2000008' },

    { name: '思想道德与法治', day: 1, startSection: 1, endSection: 2, weeks: [1,16], room: 'DJ104', teacher: '管坤', code: 'GBK2000003' },
    { name: '古代汉语', day: 1, startSection: 3, endSection: 4, weeks: [1,16], room: 'C116', teacher: '胡建君', code: 'BBK1761008' },
    { name: '英语国家社会与文化', day: 1, startSection: 5, endSection: 6, weeks: [1,8], room: 'D206', teacher: '王晓莹', code: 'XBK0614012' },
    { name: '中国美术史(2)', day: 1, startSection: 7, endSection: 8, weeks: [1,16], room: 'B310', teacher: '胡建君', code: 'BBK1761002' },
    { name: '新数字媒体基础与应用', day: 1, startSection: 9, endSection: 11, weeks: [1,16], room: 'D413', teacher: '张军英', code: 'GBK1200004' },

    { name: '世界美术史(2)', day: 2, startSection: 1, endSection: 2, weeks: [1,16], room: 'A111', teacher: '刘向娟', code: 'BBK1761004' },
    { name: '形势与政策', day: 2, startSection: 3, endSection: 4, weeks: [1,5,9,13], weekType: 'specific', room: 'EJ404', teacher: '刘子杰', code: 'GBK2000001' },
    { name: '大学英语C(2)', day: 2, startSection: 7, endSection: 8, weeks: [1,16], room: 'A321', teacher: '安宁', code: 'GBK0600010' },
    { name: '艺术实践(2)', day: 2, startSection: 9, endSection: 12, weeks: [1,14], room: '美院316', teacher: '汤宁容', code: 'BBK1761006' },

    { name: '思想道德与法治', day: 3, startSection: 1, endSection: 2, weeks: [1,16], room: 'DJ104', teacher: '管坤', code: 'GBK2000003' },
    { name: '古代汉语', day: 3, startSection: 3, endSection: 4, weeks: [1,16], room: 'C116', teacher: '胡建君', code: 'BBK1761008' },
    { name: '艺术+科技：跨领域创新', day: 3, startSection: 5, endSection: 6, weeks: [1,16], room: 'AJ204', teacher: '周予希', code: 'JBK1700001' },
    { name: '游泳(基础)', day: 3, startSection: 5, endSection: 6, weeks: [9,16], room: '游泳馆大池', teacher: '王永', code: 'GBK2800210' },
    { name: '英语国家社会与文化', day: 3, startSection: 5, endSection: 6, weeks: [9,16], room: 'D206', teacher: '阚怀未', code: 'XBK0614012' },
    { name: '中国美术史(2)', day: 3, startSection: 7, endSection: 8, weeks: [1,16], room: 'B310', teacher: '胡建君', code: 'BBK1761002' },

    { name: '男生足球(基础)', day: 4, startSection: 1, endSection: 2, weeks: [1,8], room: 'J区北侧', teacher: '益广仁', code: 'GBK2800202' },
];

// Color map
const courseColorMap = {};
let colorIdx = 0;
courses.forEach(c => {
    if (!courseColorMap[c.name]) {
        courseColorMap[c.name] = colorClasses[colorIdx % colorClasses.length];
        colorIdx++;
    }
});

let currentWeek = 1;
let currentCourseKey = '';

// Semester start: 2026-02-23 (Monday of week 1)
const semesterStart = new Date(2026, 1, 23);

function getWeekNumber() {
    const now = new Date();
    const diff = now - semesterStart;
    const weekNum = Math.floor(diff / (7 * 24 * 60 * 60 * 1000)) + 1;
    return Math.max(1, Math.min(weekNum, 16));
}

function isInWeek(course, week) {
    if (course.weekType === 'specific') {
        return course.weeks.includes(week);
    }
    return week >= course.weeks[0] && week <= course.weeks[1];
}

function getCourseKey(course, week) {
    return `${course.code}_${course.name}_day${course.day}_s${course.startSection}_w${week}`;
}

function getStorageKey(courseKey) {
    return `schedule_notes_${courseKey}`;
}

function loadNotes(courseKey) {
    try {
        const data = JSON.parse(localStorage.getItem(getStorageKey(courseKey)) || '{}');
        return data;
    } catch { return {}; }
}

function saveNotes(courseKey, notes, attachments) {
    const data = { notes, attachments };
    localStorage.setItem(getStorageKey(courseKey), JSON.stringify(data));
}

function hasNotesOrAttachments(courseKey) {
    const data = loadNotes(courseKey);
    return (data.notes && data.notes.trim()) || (data.attachments && data.attachments.length > 0);
}

function changeWeek(delta) {
    currentWeek = Math.max(1, Math.min(16, currentWeek + delta));
    render();
}

function render() {
    document.getElementById('weekLabel').textContent = `第${currentWeek}周`;
    const table = document.getElementById('scheduleTable');
    const today = new Date().getDay(); // 0=Sun,1=Mon...

    let html = '<thead><tr><th class="time-col">节次</th>';
    dayNames.forEach((d, i) => {
        const isToday = (i + 1) === today;
        html += `<th class="${isToday ? 'today' : ''}">${d}${isToday ? '<br><span style="font-size:0.7rem;color:#34d399">今天</span>' : ''}</th>`;
    });
    html += '</tr></thead><tbody>';

    // Build grid: 12 sections x 5 days
    const grid = Array.from({length: 12}, () => Array(5).fill(null));
    const span = Array.from({length: 12}, () => Array(5).fill(1));
    const skip = Array.from({length: 12}, () => Array(5).fill(false));

    const weekCourses = courses.filter(c => isInWeek(c, currentWeek));
    weekCourses.forEach(c => {
        const s = c.startSection - 1;
        const e = c.endSection - 1;
        grid[s][c.day] = c;
        span[s][c.day] = e - s + 1;
        for (let i = s + 1; i <= e; i++) skip[i][c.day] = true;
    });

    for (let sec = 0; sec < 12; sec++) {
        html += '<tr>';
        html += `<td class="time-col"><span class="section-num">${sec + 1}</span><br>${sectionTimes[sec].s}<br>${sectionTimes[sec].e}</td>`;
        for (let day = 0; day < 5; day++) {
            if (skip[sec][day]) continue;
            const c = grid[sec][day];
            if (c) {
                const key = getCourseKey(c, currentWeek);
                const hasNotes = hasNotesOrAttachments(key);
                const color = courseColorMap[c.name];
                html += `<td rowspan="${span[sec][day]}">
                    <div class="course-cell ${color}" onclick='openModal(${JSON.stringify(c).replace(/'/g, "\\'")})'> 
                        ${hasNotes ? '<div class="has-notes-badge"></div>' : ''}
                        <div class="course-name">${c.name}</div>
                        <div class="course-info">${c.room}<br>${c.teacher}</div>
                    </div>
                </td>`;
            } else {
                html += '<td></td>';
            }
        }
        html += '</tr>';
    }
    html += '</tbody>';
    table.innerHTML = html;
}

let currentAttachments = [];

function openModal(course) {
    currentCourseKey = getCourseKey(course, currentWeek);
    const data = loadNotes(currentCourseKey);

    document.getElementById('modalTitle').textContent = course.name;

    const weekStr = course.weekType === 'specific' ? `第${course.weeks.join(',')}周` : `第${course.weeks[0]}-${course.weeks[1]}周`;
    document.getElementById('modalInfo').innerHTML = `
        <div class="modal-row"><span class="modal-label">教室</span><span class="modal-value">${course.room}</span></div>
        <div class="modal-row"><span class="modal-label">教师</span><span class="modal-value">${course.teacher}</span></div>
        <div class="modal-row"><span class="modal-label">节次</span><span class="modal-value">第${course.startSection}-${course.endSection}节 (${sectionTimes[course.startSection-1].s}-${sectionTimes[course.endSection-1].e})</span></div>
        <div class="modal-row"><span class="modal-label">周次</span><span class="modal-value">${weekStr}</span></div>
        <div class="modal-row"><span class="modal-label">课程号</span><span class="modal-value">${course.code}</span></div>
    `;

    document.getElementById('notesArea').value = data.notes || '';
    currentAttachments = data.attachments || [];
    renderAttachments();

    // Reset tab
    switchTab('notes', document.querySelector('.modal-tab'));

    document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
}

function saveAndClose() {
    const notes = document.getElementById('notesArea').value;
    saveNotes(currentCourseKey, notes, currentAttachments);
    closeModal();
    render();
    showToast();
}

function showToast() {
    const t = document.getElementById('saveToast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
}

function switchTab(tabId, btn) {
    document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tabId).classList.add('active');
}

function handleFiles(files) {
    Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const att = {
                name: file.name,
                size: formatSize(file.size),
                type: file.type,
                data: e.target.result,
                id: Date.now() + '_' + Math.random().toString(36).substr(2, 6)
            };
            currentAttachments.push(att);
            renderAttachments();
        };
        reader.readAsDataURL(file);
    });
    document.getElementById('fileInput').value = '';
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function getFileIcon(type, name) {
    if (type.startsWith('image/')) return '🖼️';
    if (name.endsWith('.pdf')) return '📕';
    if (name.endsWith('.doc') || name.endsWith('.docx')) return '📄';
    if (name.endsWith('.ppt') || name.endsWith('.pptx')) return '📊';
    if (name.endsWith('.xls') || name.endsWith('.xlsx')) return '📗';
    return '📎';
}

function renderAttachments() {
    const list = document.getElementById('attachList');
    if (currentAttachments.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:#6b7280;font-size:0.85rem;padding:10px;">暂无附件</div>';
        return;
    }
    list.innerHTML = currentAttachments.map((att, i) => {
        const isImg = att.type.startsWith('image/');
        return `<div class="attachment-item">
            <span class="att-icon">${getFileIcon(att.type, att.name)}</span>
            <div class="att-info">
                <div class="att-name">${att.name}</div>
                <div class="att-size">${att.size}</div>
                ${isImg ? `<img class="attachment-preview" src="${att.data}" onclick="previewImage('${att.data}')" alt="${att.name}">` : ''}
            </div>
            <button class="att-delete" onclick="deleteAttachment(${i})">删除</button>
        </div>`;
    }).join('');
}

function deleteAttachment(idx) {
    currentAttachments.splice(idx, 1);
    renderAttachments();
}

function previewImage(src) {
    document.getElementById('imgPreview').src = src;
    document.getElementById('imgOverlay').classList.add('show');
    event.stopPropagation();
}

// Drag & drop
document.addEventListener('DOMContentLoaded', () => {
    const zone = document.getElementById('attachZone');
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = 'rgba(167,139,250,0.6)'; });
    zone.addEventListener('dragleave', () => { zone.style.borderColor = 'rgba(255,255,255,0.15)'; });
    zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.style.borderColor = 'rgba(255,255,255,0.15)';
        handleFiles(e.dataTransfer.files);
    });
});

// Init
currentWeek = getWeekNumber();
render();
</script>
